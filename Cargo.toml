[workspace]
resolver = "2"
members = [
    "antigen",
    "antigen-macros",
    "cargo-antigen",
]

[workspace.package]
version = "0.0.1"
edition = "2021"
rust-version = "1.75"
authors = ["Christopher Averill <c@tek.gy>"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/antigen-rs/antigen"
homepage = "https://github.com/antigen-rs/antigen"
readme = "README.md"
keywords = ["immunity", "memory", "failure-class", "lint", "antibody"]
categories = ["development-tools", "development-tools::cargo-plugins", "development-tools::testing"]

[workspace.dependencies]
syn = { version = "2", features = ["full", "extra-traits", "visit"] }
quote = "1"
proc-macro2 = "1"
walkdir = "2"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
