name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.0.2)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ -z "$TAG_VERSION" ]; then
            TAG_VERSION="${{ inputs.tag }}"
            TAG_VERSION="${TAG_VERSION#v}"
          fi
          WORKSPACE_VERSION=$(grep -E '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Tag version: $TAG_VERSION"
          echo "Workspace version: $WORKSPACE_VERSION"
          if [ "$TAG_VERSION" != "$WORKSPACE_VERSION" ]; then
            echo "ERROR: tag version ($TAG_VERSION) does not match workspace version ($WORKSPACE_VERSION)"
            exit 1
          fi

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo check --workspace --all-targets
      - run: cargo test --workspace --all-targets
      - run: cargo doc --workspace --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"

  publish-antigen:
    name: Publish antigen
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish antigen
        run: cargo publish -p antigen --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-cargo-antigen:
    name: Publish cargo-antigen
    needs: publish-antigen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Wait for antigen to be available on crates.io
        run: sleep 30
      - name: Publish cargo-antigen
        run: cargo publish -p cargo-antigen --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: Create GitHub release
    needs: [publish-antigen, publish-cargo-antigen]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract changelog entry
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [ -z "$TAG" ]; then
            TAG="${{ inputs.tag }}"
          fi
          VERSION="${TAG#v}"
          # Extract the section from CHANGELOG.md between [VERSION] and the next ## heading
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" ver "\\]") found = 1
              else next
            }
            found
          ' CHANGELOG.md > release-notes.md
          echo "Release notes from CHANGELOG.md:"
          cat release-notes.md
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
