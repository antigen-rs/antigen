name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.0.2)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Verify version matches tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_VERSION="${{ inputs.tag }}"
            TAG_VERSION="${TAG_VERSION#v}"
          else
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          WORKSPACE_VERSION=$(grep -E '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Tag version: $TAG_VERSION"
          echo "Workspace version: $WORKSPACE_VERSION"
          if [ "$TAG_VERSION" != "$WORKSPACE_VERSION" ]; then
            echo "ERROR: tag version ($TAG_VERSION) does not match workspace version ($WORKSPACE_VERSION)"
            exit 1
          fi

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo check --workspace --all-targets
      - run: cargo test --workspace --all-targets
      - run: cargo doc --workspace --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"

  # Publish topologically:
  #   fingerprint → attestation → macros → antigen → cargo-antigen
  # Each step waits for the previous to land on crates.io's index (sleep 30s)
  # before continuing — crates.io has a small index-replication delay.

  publish-antigen-fingerprint:
    name: Publish antigen-fingerprint
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish antigen-fingerprint
        run: cargo publish -p antigen-fingerprint --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-antigen-attestation:
    name: Publish antigen-attestation
    needs: publish-antigen-fingerprint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Wait for antigen-fingerprint on crates.io index
        run: sleep 30
      - name: Publish antigen-attestation
        run: cargo publish -p antigen-attestation --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-antigen-macros:
    name: Publish antigen-macros
    needs: publish-antigen-attestation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Wait for antigen-attestation on crates.io index
        run: sleep 30
      - name: Publish antigen-macros
        run: cargo publish -p antigen-macros --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-antigen:
    name: Publish antigen
    needs: publish-antigen-macros
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Wait for antigen-macros on crates.io index
        run: sleep 30
      - name: Publish antigen
        run: cargo publish -p antigen --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-cargo-antigen:
    name: Publish cargo-antigen
    needs: publish-antigen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Wait for antigen on crates.io index
        run: sleep 30
      - name: Publish cargo-antigen
        run: cargo publish -p cargo-antigen --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: Create GitHub release
    needs:
      - publish-antigen-fingerprint
      - publish-antigen-attestation
      - publish-antigen-macros
      - publish-antigen
      - publish-cargo-antigen
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract changelog entry
        id: changelog
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          # Use index() for exact literal matching — avoids regex dot-wildcard
          # false-positives when version strings share numeric prefixes.
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]") > 0) found = 1
              else next
            }
            found
          ' CHANGELOG.md > release-notes.md
          echo "Release notes from CHANGELOG.md:"
          cat release-notes.md
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
