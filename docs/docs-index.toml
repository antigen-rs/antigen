# Machine-readable documentation index for antigen.
#
# This file catalogs every doc with structured metadata so LLM tooling,
# automated docs validation, and search systems can route queries to
# the right document. Maintained alongside docs/index.md (the
# human-readable equivalent).
#
# Schema: each [[doc]] entry has:
#   path        — relative path from docs/
#   title       — doc title
#   purpose     — one-line description
#   audience    — list: "human-developer" | "human-team-lead" | "human-researcher" | "llm-agent" | "any"
#   category    — "concept" | "tutorial" | "reference" | "guide" | "vision" | "architecture" | "research-substrate" | "co-native"
#   tier        — "user-facing" | "project-internal" | "research"
#   stability   — "stable" | "evolving" | "draft"
#   related     — list of paths to related docs

