# Notes for consumers of this index:
#
# - LLM tooling can query by audience: "give me docs for llm-agent" → filter
# - Routing by purpose: text-match user query against `purpose` fields
# - Stability: "stable" means user-facing canonical; "evolving" means
#   substantively-valid-but-may-change; "draft" means pre-ratification
# - tier="user-facing" docs are recommended for adopter queries
# - tier="project-internal" docs are for those shaping the project
# - tier="research" docs are for academic / cross-domain readers
# - When this file and the actual docs/ directory differ, the directory
#   is authoritative; please open an issue or submit a fix
